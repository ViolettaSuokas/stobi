<svg width="1024" height="1280" viewBox="0 0 1024 1280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0.2" y1="0.05" x2="0.85" y2="0.95">
      <stop offset="0" stop-color="#E0E7FF" />
      <stop offset="0.5" stop-color="#C4B5FD" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
    <radialGradient id="softGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.22" />
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Light background -->
  <rect width="1024" height="1280" fill="#FAFAF8" />

  <!-- Subtle purple glow behind mascot -->
  <circle cx="512" cy="540" r="500" fill="url(#softGlow)" />

  <!-- Mascot — same geometry as icon, centered around (512, 540) -->
  <g transform="rotate(-2 512 540)">
    <path
      d="M 428 297
         L 535 297
         A 304 304 0 0 1 839 601
         L 839 647
         A 137 137 0 0 1 702 784
         L 352 784
         A 167 167 0 0 1 185 617
         L 185 540
         A 243 243 0 0 1 428 297
         Z"
      fill="url(#bodyGrad)"
    />

    <!-- Highlight blob -->
    <ellipse
      cx="345"
      cy="398"
      rx="101"
      ry="35"
      fill="#FFFFFF"
      fill-opacity="0.55"
      transform="rotate(-12 345 398)"
    />

    <!-- Face — counter-rotated -->
    <g transform="rotate(2 512 540)">
      <ellipse cx="431" cy="525" rx="33" ry="43" fill="#1A1A2E" />
      <ellipse cx="593" cy="525" rx="33" ry="43" fill="#1A1A2E" />

      <path
        d="M 459 603 A 53 30 0 0 0 565 603"
        stroke="#1A1A2E"
        stroke-width="18"
        stroke-linecap="round"
        fill="none"
      />

      <ellipse cx="368" cy="674" rx="35" ry="20" fill="#FCA5A5" fill-opacity="0.8" />
      <ellipse cx="656" cy="674" rx="35" ry="20" fill="#FCA5A5" fill-opacity="0.8" />
    </g>
  </g>

  <!-- Yellow sparkles around mascot -->
  <g transform="translate(140 230)" fill="#FACC15">
    <path d="M 0 -55 L 14 -14 L 55 0 L 14 14 L 0 55 L -14 14 L -55 0 L -14 -14 Z" />
  </g>
  <g transform="translate(870 300)" fill="#FACC15">
    <path d="M 0 -38 L 10 -10 L 38 0 L 10 10 L 0 38 L -10 10 L -38 0 L -10 -10 Z" />
  </g>
  <g transform="translate(900 830)" fill="#FACC15">
    <path d="M 0 -28 L 7 -7 L 28 0 L 7 7 L 0 28 L -7 7 L -28 0 L -7 -7 Z" />
  </g>
  <circle cx="120" cy="810" r="11" fill="#FACC15" />
  <circle cx="710" cy="165" r="9" fill="#FACC15" />

  <!-- "Stobi" text under the mascot -->
  <text
    x="512"
    y="1100"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
    font-size="120"
    font-weight="900"
    text-anchor="middle"
    fill="#1A1A2E"
    letter-spacing="-2"
  >Stobi</text>
</svg>
